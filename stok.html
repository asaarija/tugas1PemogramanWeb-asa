<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width= , initial-scale=1.0" />
    <link href="src/input.css" rel="stylesheet" />
    <link href="src/output.css" rel="stylesheet" />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- SweetAlert2 untuk Pop up -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_drop_down"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <title>Bahan Ajar</title>
  </head>
  <body>
    <!-- Header starts -->
    <header
      class="bg-blue-500 w-full h-[10vh] border-b-4 border-yellow-400 flex items-center justify-between p-4 shadow-lg absolute top-0 left-0"
    >
      <img src="img/logoUt.jpg" alt="" class="w-17.5" />
      <nav class="w-full p-4">
        <ul class="w-full flex gap-8 items-center justify-center">
          <li class="font-bold hover:text-yellow-400">
            <a href="#">Informasi Bahan Ajar</a>
          </li>
          <li class="font-bold hover:text-yellow-400">
            <a href="tracking.html">Tracking Pengiriman</a>
          </li>

          <!-- dropdown start -->
          <li class="dropdown font-bold hover:text-yellow-400">
            <div class="items-center gap-2 flex cursor-pointer">
              <a href="#">Laporan</a>
              <span class="material-symbols-outlined"> arrow_drop_down </span>
            </div>
            <div
              class="dropdown-menu absolute flex-col shadow-lg gap-2 p-4 bg-white text-black rounded hidden"
            >
              <a href="#" class="hover:text-blue-400"
                >Monitoring Progress DO Bahan Ajar</a
              >
              <a href="stok.html" class="hover:text-blue-400"
                >Rekap Bahan Ajar</a
              >
            </div>
          </li>
          <!-- dropdown end -->

          <li class="font-bold hover:text-yellow-400">
            <a href="#">Histori Transaksi Bahan Ajar</a>
          </li>
        </ul>
      </nav>
      <button
        type="submit"
        id="logoutBtn"
        class="bg-yellow-400 py-3 px-5 rounded-4xl shadow-lg flex hover:bg-yellow-300 transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#000000"
        >
          <path
            d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"
          />
        </svg>
        <h1>Logout</h1>
      </button>
    </header>
    <!-- Header end -->

    <main class="w-full mt-20">
      <section class="w-full px-10 py-5 space-y-6">
        <!-- add new start -->
        <form id="stokForm" class="w-full shadow-lg p-3 rounded">
          <div class="flex gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#F19E39"
            >
              <path
                d="M440-280h80v-160h160v-80H520v-160h-80v160H280v80h160v160Zm40 200q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"
              />
            </svg>
            <h1 class="font-bold">Tambahkan Bahan Ajar</h1>
          </div>
          <div class="pt-5">
            <div
              class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end"
            >
              <!-- Input Kode -->
              <div>
                <label
                  for="kode"
                  class="block text-xs font-semibold text-gray-500 mb-1"
                  >Kode Bahan Ajar</label
                >
                <input
                  type="text"
                  id="kode"
                  placeholder="Misal: 0001"
                  required
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
                />
              </div>

              <!-- Input Nama -->
              <div class="lg:col-span-2">
                <label
                  for="nama"
                  class="block text-xs font-semibold text-gray-500 mb-1"
                  >Nama Bahan Ajar</label
                >
                <input
                  type="text"
                  id="nama"
                  placeholder="Misal: Pemograman berbasis Website"
                  required
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
                />
              </div>

              <!-- Input Stok -->
              <div>
                <label
                  for="stok"
                  class="block text-xs font-semibold text-gray-500 mb-1"
                  >Jumlah Stok</label
                >
                <input
                  type="number"
                  id="stok"
                  placeholder="0"
                  required
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
                />
              </div>
            </div>
            <div
              class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end"
            >
              <!-- Input Lokasi -->
              <div class="lg:col-span-2">
                <label
                  for="lokasi"
                  class="block text-xs font-semibold text-gray-500 mb-1"
                  >Lokasi Rak/Gudang</label
                >
                <input
                  type="text"
                  id="lokasi"
                  placeholder="Misal: Rak A1, Gudang 3"
                  required
                  class="w-full px-4 py-2.5 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
                />
              </div>

              <!-- Input Cover (File) -->
              <div>
                <label
                  for="cover"
                  class="block text-xs font-semibold text-gray-500 mb-1"
                  >Cover Buku</label
                >
                <input
                  type="file"
                  id="cover"
                  required
                  class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-gray-50 text-sm focus:outline-none file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer"
                />
              </div>

              <!-- Tombol Tambah -->
              <div>
                <button
                  type="submit"
                  class="w-full bg-yellow-500 hover:bg-yellow-400 text-white font-bold py-2.5 px-4 rounded-lg shadow transition-all transform hover:-translate-y-0.5 flex items-center justify-center gap-2 text-sm"
                >
                  <i class="fa-solid fa-save"></i> Simpan Data
                </button>
              </div>
            </div>
          </div>
        </form>
        <!-- add new end -->

        <!-- data bahan ajar start -->
        <div class="shadow-lg p-6 rounded-lg bg-white">
          <h2 class="text-2xl font-bold mb-4">Rekap Stok Bahan Ajar</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full border border-gray-200 text-sm">
              <thead class="bg-gray-100 text-left">
                <tr>
                  <th class="p-3 border-b">Kode Lokasi</th>
                  <th class="p-3 border-b">Kode Barang</th>
                  <th class="p-3 border-b">Nama Barang</th>
                  <th class="p-3 border-b">Jenis</th>
                  <th class="p-3 border-b">Edisi</th>
                  <th class="p-3 border-b">Stok</th>
                  <th class="p-3 border-b">Cover</th>
                </tr>
              </thead>
              <tbody id="stockTableBody"></tbody>
            </table>
          </div>
        </div>
        <!-- data bahan ajar end -->
      </section>
    </main>
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
